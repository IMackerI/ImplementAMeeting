<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Recorder</title>
  <meta name="description" content="Record meetings, transcribe with Whisper, and summarise with Gemini AI." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; }
    
    :root {
      --primary: #818cf8;
      --bg-dark: #0b0e14;
      --card-bg: rgba(23, 28, 41, 0.6);
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
      color: #f1f5f9;
      min-height: 100vh;
      margin: 0;
    }

    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
    }

    /* Recording pulse ring */
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .pulse-ring { animation: pulse-ring 1.8s ease-out infinite; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      animation: spin 0.8s linear infinite;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      width: 1.25rem;
      height: 1.25rem;
      display: inline-block;
    }

    /* Markdown styling */
    .prose { font-size: 0.875rem; line-height: 1.6; }
    .prose h1, .prose h2, .prose h3 { color: white; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; font-family: 'Outfit', sans-serif; }
    .prose p { margin-bottom: 0.75rem; color: #cbd5e1; }
    .prose ul, .prose ol { margin-bottom: 0.75rem; padding-left: 1.25rem; color: #cbd5e1; }
    .prose li { margin-bottom: 0.25rem; }
    .prose code { background: rgba(255,255,255,0.1); padding: 0.1rem 0.35rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.8rem; color: #a5b4fc; }
    .prose pre { background: rgba(0,0,0,0.4); padding: 1.25rem; border-radius: 0.75rem; overflow-x: auto; margin: 1.25rem 0; border: 1px solid var(--border); font-size: 0.75rem; }

    .btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body class="py-12 px-4">

  <!-- ======== HEADER ======== -->
  <header class="max-w-2xl mx-auto mb-10 text-center px-4">
    <h1 class="text-4xl font-bold tracking-tight text-white mb-3">Meeting Recorder</h1>
    <p class="text-slate-400 text-sm font-medium tracking-wide uppercase">Capture • Transcribe • Analyze • Search</p>
  </header>

  <main class="max-w-2xl mx-auto space-y-6">

    <!-- ======== SETTINGS ======== -->
    <section class="glass p-6">
      <h2 class="text-[10px] font-bold text-slate-500 mb-5 uppercase tracking-[0.2em]">Settings</h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 items-end">
        <div>
          <label for="summaryModelSelect" class="block text-xs text-slate-400 mb-2 font-medium">Summary Model</label>
          <select id="summaryModelSelect"
            class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-3 py-2.5 text-xs text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all cursor-pointer appearance-none">
            <option value="">Loading…</option>
          </select>
        </div>

        <div>
          <label for="chatModelSelect" class="block text-xs text-slate-400 mb-2 font-medium">Chat Model</label>
          <select id="chatModelSelect"
            class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-3 py-2.5 text-xs text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all cursor-pointer appearance-none">
            <option value="">Loading…</option>
          </select>
        </div>

        <div>
          <label for="chunkInterval" class="block text-xs text-slate-400 mb-2 font-medium">Chunk (sec)</label>
          <input id="chunkInterval" type="number" min="10" max="600" value="30"
            class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-3 py-2.5 text-xs text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all" />
        </div>
      </div>
    </section>

    <!-- ======== RECORDING CARD ======== -->
    <section id="recordCard" class="glass p-10">
      <div class="flex flex-col items-center gap-6">
        <div class="relative flex items-center justify-center w-20 h-20">
          <span id="pulseRing1" class="pulse-ring hidden absolute inset-0 rounded-full bg-red-500/20"></span>
          <span id="pulseRing2" class="pulse-ring hidden absolute inset-0 rounded-full bg-red-500/10" style="animation-delay: 0.6s"></span>
          <div id="micIcon" class="relative z-10 w-16 h-16 rounded-full bg-slate-900/80 border border-slate-700 flex items-center justify-center text-slate-500 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 016 0v8.25a3 3 0 01-3 3z" />
            </svg>
          </div>
        </div>

        <div id="timer" class="hidden text-2xl font-mono font-bold text-red-500 tracking-tight">00:00:00</div>
        <div id="chunkStatus" class="hidden text-[10px] text-slate-500 uppercase tracking-widest text-center"></div>

        <div class="flex gap-4">
          <button id="startBtn" class="btn bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm px-6 py-3 rounded-xl shadow-lg shadow-indigo-600/20 transition-all">
            Start Meeting
          </button>
          <button id="stopBtn" disabled class="btn bg-rose-600 hover:bg-rose-500 text-white font-semibold text-sm px-6 py-3 rounded-xl shadow-lg shadow-rose-600/20 transition-all">
            End & Summarize
          </button>
        </div>

        <div id="processingStatus" class="hidden flex items-center gap-3 text-sm text-slate-400 font-medium">
          <span class="spinner"></span>
          <span id="processingText">Processing…</span>
        </div>
      </div>
    </section>

    <!-- ======== CHAT CARD ======== -->
    <section id="chatCard" class="hidden glass p-6 flex flex-col h-[500px]">
      <div class="flex items-center justify-between mb-4 px-2">
        <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Meeting Assistant</h3>
        <label class="flex items-center gap-2 cursor-pointer group">
          <span class="text-[10px] uppercase font-bold text-slate-500 group-hover:text-slate-300 transition-colors tracking-tighter">Search Web</span>
          <div class="relative">
            <input type="checkbox" id="searchToggle" class="sr-only peer">
            <div class="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-600"></div>
          </div>
        </label>
      </div>
      
      <div id="chatHistory" class="flex-1 overflow-y-auto mb-4 space-y-4 pr-2 custom-scrollbar">
        <div class="text-[10px] text-slate-500 italic text-center py-4 uppercase tracking-widest">Awaiting transcript chunks...</div>
      </div>

      <div class="flex gap-2 p-2 bg-slate-900/30 rounded-2xl border border-slate-700/50">
        <input id="chatInput" type="text"
          placeholder="Ask a question about the meeting..."
          class="flex-1 bg-transparent border-none px-4 py-2 text-sm text-slate-200 focus:outline-none" />
        <button id="sendChatBtn"
          class="btn bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-5 py-2 rounded-xl transition-all shadow-lg shadow-indigo-600/20">
          Send
        </button>
      </div>
    </section>

    <!-- ======== RESULTS ======== -->
    <section id="resultsCard" class="hidden glass p-8 space-y-8 fade-in">
      <details id="transcriptDetails" class="border border-slate-700/50 rounded-2xl overflow-hidden glass bg-transparent">
        <summary class="px-5 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center justify-between cursor-pointer hover:bg-white/5 transition-colors">
          <span>📝 Full Transcript</span>
          <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </summary>
        <div class="p-5 border-t border-slate-700/50 bg-black/20">
          <pre id="transcriptDisplay" class="text-xs text-slate-400 whitespace-pre-wrap font-mono max-h-64 overflow-y-auto leading-relaxed custom-scrollbar"></pre>
        </div>
      </details>

      <div class="space-y-4">
        <div class="flex items-center justify-between">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">📋 Summary</label>
            <button id="toggleEditBtn" class="text-[10px] uppercase font-bold text-indigo-400 hover:text-indigo-300 transition-colors tracking-widest">Preview Markdown</button>
        </div>
        <div id="summaryPreview" class="prose max-w-none bg-slate-900/50 border border-slate-700/50 rounded-2xl p-6 min-h-[200px] hidden font-inter"></div>
        <textarea id="summaryTextarea" rows="20"
          class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl px-5 py-4 text-sm text-slate-200 font-mono leading-relaxed focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all custom-scrollbar"
          placeholder="Summary will appear here…"></textarea>
      </div>

      <div class="border-t border-slate-700/50 pt-6">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">AI Iteration</p>
        <div class="flex gap-2">
          <input id="editPromptInput" type="text"
            placeholder='e.g. "Focus more on the budget" or "Summarize into 3 bullets"'
            class="flex-1 bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all" />
          <button id="updateBtn"
            class="btn bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-6 py-3 rounded-xl shadow-lg shadow-indigo-600/20 whitespace-nowrap">
            Update View
          </button>
        </div>
      </div>
    </section>

  </main>

  <div id="toastContainer" class="fixed bottom-6 right-6 space-y-3 z-50"></div>

  <script>
  (() => {
    'use strict';

    // --- DOM refs ---
    const startBtn         = document.getElementById('startBtn');
    const stopBtn          = document.getElementById('stopBtn');
    const timer            = document.getElementById('timer');
    const chunkStatus      = document.getElementById('chunkStatus');
    const pulseRing1       = document.getElementById('pulseRing1');
    const pulseRing2       = document.getElementById('pulseRing2');
    const micIcon          = document.getElementById('micIcon');
    const processingStatus = document.getElementById('processingStatus');
    const processingText   = document.getElementById('processingText');
    const resultsCard      = document.getElementById('resultsCard');
    const transcriptDisplay= document.getElementById('transcriptDisplay');
    const summaryTextarea  = document.getElementById('summaryTextarea');
    const editPromptInput  = document.getElementById('editPromptInput');
    const updateBtn        = document.getElementById('updateBtn');
    const summaryModelSelect = document.getElementById('summaryModelSelect');
    const chatModelSelect    = document.getElementById('chatModelSelect');
    const chatCard           = document.getElementById('chatCard');
    const chatHistory        = document.getElementById('chatHistory');
    const chatInput          = document.getElementById('chatInput');
    const sendChatBtn        = document.getElementById('sendChatBtn');
    const searchToggle     = document.getElementById('searchToggle');
    const summaryPreview   = document.getElementById('summaryPreview');
    const toggleEditBtn    = document.getElementById('toggleEditBtn');
    const chunkIntervalInput = document.getElementById('chunkInterval');
    const toastContainer   = document.getElementById('toastContainer');

    // --- State ---
    let mediaRecorder   = null;
    let chunkTimer      = null;
    let allTranscripts  = [];
    let chunkIndex      = 0;
    let timerInterval   = null;
    let secondsElapsed  = 0;
    let isRecording     = false;
    let currentSessionId = null;

    // --- Load models ---
    (async () => {
      try {
        const res = await fetch('/models');
        const { models, default: def } = await res.json();
        const options = models.map(m =>
          `<option value="${m}" ${m === def ? 'selected' : ''}>${m.replace('models/', '')}</option>`
        ).join('');
        summaryModelSelect.innerHTML = options;
        chatModelSelect.innerHTML = options;
      } catch {
        const fallback = '<option value="models/gemini-2.0-flash">gemini-2.0-flash</option>';
        summaryModelSelect.innerHTML = fallback;
        chatModelSelect.innerHTML = fallback;
      }
    })();

    // --- Timer helpers ---
    function formatTime(s) {
      const h = String(Math.floor(s / 3600)).padStart(2, '0');
      const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const sec = String(s % 60).padStart(2, '0');
      return `${h}:${m}:${sec}`;
    }

    function startTimerDisplay() {
      secondsElapsed = 0;
      timer.textContent = formatTime(0);
      timer.classList.remove('hidden');
      timerInterval = setInterval(() => {
        secondsElapsed++;
        timer.textContent = formatTime(secondsElapsed);
      }, 1000);
    }

    function stopTimerDisplay() {
      clearInterval(timerInterval);
      timer.classList.add('hidden');
    }

    // --- UI state helpers ---
    function setRecordingUI(active) {
      isRecording = active;
      startBtn.disabled = active;
      stopBtn.disabled  = !active;
      pulseRing1.classList.toggle('hidden', !active);
      pulseRing2.classList.toggle('hidden', !active);
      micIcon.classList.toggle('text-red-500', active);
      micIcon.classList.toggle('border-red-500/50', active);
      micIcon.classList.toggle('text-slate-500', !active);
      micIcon.classList.toggle('border-slate-700', !active);
      if (active) {
        chatCard.classList.remove('hidden');
      } else {
        chunkStatus.classList.add('hidden');
      }
    }

    function setProcessing(show, text = 'Processing…') {
      processingStatus.classList.toggle('hidden', !show);
      processingText.textContent = text;
      startBtn.disabled = show || isRecording;
      stopBtn.disabled  = show;
    }

    function showResults() {
      resultsCard.classList.remove('hidden');
      resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showToast(msg, type = 'error') {
      const el = document.createElement('div');
      el.className = `toast text-xs px-5 py-4 rounded-xl shadow-2xl font-bold uppercase tracking-widest ${
        type === 'error'   ? 'bg-rose-900/90 text-rose-100 border border-rose-500/30' :
        type === 'success' ? 'bg-emerald-900/90 text-emerald-100 border border-emerald-500/30' :
                             'bg-slate-800/90 text-slate-200 border border-slate-600/30'
      } backdrop-blur-xl`;
      el.textContent = msg;
      toastContainer.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(10px)';
        setTimeout(() => el.remove(), 300);
      }, 4000);
    }

    // --- Flush a chunk ---
    async function flushChunk(blob) {
      if (!blob || blob.size === 0) return;

      const idx = chunkIndex++;
      const ext = (mediaRecorder.mimeType || '').includes('ogg') ? 'ogg' : 'webm';
      const form = new FormData();
      form.append('audio', blob, `chunk_${idx}.${ext}`);
      form.append('chunk_index', String(idx));
      if (currentSessionId) form.append('session_id', currentSessionId);

      chunkStatus.textContent = `• Transcribing chunk ${idx + 1}…`;
      chunkStatus.classList.remove('hidden');

      try {
        const res = await fetch('/transcribe-chunk', { method: 'POST', body: form });
        const data = await res.json();
        
        if (!currentSessionId && data.session_id) {
          currentSessionId = data.session_id;
          showToast('Session Active', 'success');
        }

        if (data.transcript) {
          allTranscripts.push(data.transcript);
          transcriptDisplay.textContent = allTranscripts.join('\n\n');
          if (allTranscripts.length === 1) {
            appendChatMessage('ai', 'Recording started. I will analyze the meeting context as it arrives. Feel free to ask questions anytime!');
          }
        }
        chunkStatus.textContent = `✓ Chunk ${idx + 1} finalized`;
      } catch (err) {
        chunkStatus.textContent = `⚠ Chunk ${idx + 1} error`;
        showToast(`Sync Failed: ${idx + 1}`, 'error');
      }
    }

    // --- Recording ---
    async function startRecordingFlow() {
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        showToast('Mic Denied', 'error');
        return;
      }

      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.addEventListener('dataavailable', e => {
        if (e.data && e.data.size > 0) flushChunk(e.data);
      });

      mediaRecorder.start();
      setRecordingUI(true);
      startTimerDisplay();

      const intervalMs = Math.max(10, Number(chunkIntervalInput.value) || 30) * 1000;
      chunkTimer = setInterval(() => {
        if (mediaRecorder?.state === 'recording') {
          mediaRecorder.stop(); 
          mediaRecorder.start();
        }
      }, intervalMs);
    }

    startBtn.addEventListener('click', () => {
      allTranscripts = [];
      chunkIndex = 0;
      currentSessionId = null; 
      chatHistory.innerHTML = '';
      startRecordingFlow();
    });

    stopBtn.addEventListener('click', async () => {
      if (mediaRecorder?.state !== 'recording') return;
      setRecordingUI(false);
      stopTimerDisplay();
      if (chunkTimer) clearInterval(chunkTimer);
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());

      setProcessing(true, 'Analyzing meeting data…');
      await new Promise(r => setTimeout(r, 2000));

      if (allTranscripts.length === 0) {
        setProcessing(false);
        showToast('Empty Session', 'error');
        return;
      }

      try {
        const res = await fetch('/summarise', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_transcript: allTranscripts.join('\n\n'),
            model: summaryModelSelect.value,
            session_id: currentSessionId,
          }),
        });
        const { summary } = await res.json();
        summaryTextarea.value = summary;
        renderSummary();
        setProcessing(false);
        showResults();
        showToast('Ready', 'success');
      } catch (err) {
        setProcessing(false);
        showToast('Summary Failed', 'error');
      }
    });

    // --- Chat Logic ---
    function appendChatMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `p-5 rounded-2xl text-sm max-w-[90%] border ${
        role === 'user' 
          ? 'bg-indigo-600/10 border-indigo-500/20 self-end ml-auto text-slate-100 shadow-lg' 
          : 'bg-slate-800/40 border-slate-700/50 self-start text-slate-200'
      }`;
      
      const roleLabel = `<div class="text-[9px] uppercase font-bold tracking-[0.2em] text-slate-500 mb-3">${role === 'ai' ? 'Assistant' : 'Speaker'}</div>`;
      const content = `<div class="prose prose-invert">${DOMPurify.sanitize(marked.parse(text))}</div>`;
      
      msgDiv.innerHTML = roleLabel + content;
      chatHistory.appendChild(msgDiv);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    async function handleChat() {
      const question = chatInput.value.trim();
      if (!question) return;
      chatInput.value = '';
      appendChatMessage('user', question);

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: currentSessionId || '',
            user_prompt: question,
            model: chatModelSelect.value,
            enable_search: searchToggle.checked
          })
        });
        const data = await res.json();
        appendChatMessage('ai', data.response);
      } catch (err) {
        console.error("Chat error:", err);
        showToast(`Chat Error: ${err.message}`, 'error');
        appendChatMessage('ai', `⚠️ Error: ${err.message}. Please check if the selected model supports the current configuration.`);
      }
    }

    sendChatBtn.addEventListener('click', handleChat);
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleChat(); });

    // --- Summary rendering & Toggle ---
    function renderSummary() {
      summaryPreview.innerHTML = DOMPurify.sanitize(marked.parse(summaryTextarea.value));
    }

    toggleEditBtn.addEventListener('click', () => {
      const isPreview = summaryPreview.classList.contains('hidden');
      if (isPreview) {
        renderSummary();
        summaryPreview.classList.remove('hidden');
        summaryTextarea.classList.add('hidden');
        toggleEditBtn.textContent = 'Edit Content';
      } else {
        summaryPreview.classList.add('hidden');
        summaryTextarea.classList.remove('hidden');
        toggleEditBtn.textContent = 'Preview View';
      }
    });

    updateBtn.addEventListener('click', async () => {
      const ep = editPromptInput.value.trim();
      if (!ep) return;
      setProcessing(true, 'Updating summary…');
      try {
        const res = await fetch('/edit-summary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            current_summary: summaryTextarea.value,
            edit_prompt: ep,
            model: summaryModelSelect.value,
            session_id: currentSessionId,
          }),
        });
        const { summary } = await res.json();
        summaryTextarea.value = summary;
        if (!summaryPreview.classList.contains('hidden')) renderSummary();
        editPromptInput.value = '';
        showToast('Updated', 'success');
      } catch (err) {
        showToast('Update Failed', 'error');
      } finally {
        setProcessing(false);
      }
    });

  })();
  </script>
</body>
</html>
